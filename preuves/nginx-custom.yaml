apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="fr">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>EKS 5ASRCB — ESGI 2026</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: 'Segoe UI', sans-serif;
          background: #0f0f1a;
          color: #e0e0e0;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 40px 20px;
        }
        .badge {
          background: #00d4ff22;
          border: 1px solid #00d4ff55;
          color: #00d4ff;
          padding: 6px 18px;
          border-radius: 20px;
          font-size: 13px;
          margin-bottom: 24px;
          letter-spacing: 1px;
        }
        h1 {
          font-size: 2.8rem;
          font-weight: 700;
          background: linear-gradient(90deg, #00d4ff, #7b61ff);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          margin-bottom: 12px;
          text-align: center;
        }
        .subtitle {
          color: #888;
          font-size: 1.1rem;
          margin-bottom: 48px;
          text-align: center;
        }
        .grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 20px;
          max-width: 860px;
          width: 100%;
          margin-bottom: 48px;
        }
        .card {
          background: #1a1a2e;
          border: 1px solid #2a2a4a;
          border-radius: 12px;
          padding: 24px;
          text-align: center;
          transition: border-color 0.2s;
        }
        .card:hover { border-color: #00d4ff55; }
        .card .icon { font-size: 2rem; margin-bottom: 12px; }
        .card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: #fff; }
        .card p { font-size: 0.85rem; color: #666; }
        .stack {
          display: flex;
          gap: 12px;
          flex-wrap: wrap;
          justify-content: center;
          margin-bottom: 48px;
        }
        .tag {
          background: #1a1a2e;
          border: 1px solid #2a2a4a;
          padding: 6px 14px;
          border-radius: 6px;
          font-size: 0.82rem;
          color: #aaa;
        }
        .tag.blue { border-color: #00d4ff44; color: #00d4ff; }
        .tag.purple { border-color: #7b61ff44; color: #7b61ff; }
        .tag.green { border-color: #00ff9544; color: #00ff95; }
        footer {
          color: #444;
          font-size: 0.82rem;
          text-align: center;
        }
        footer span { color: #666; }
      </style>
    </head>
    <body>
      <div class="badge">✅ DÉPLOIEMENT RÉUSSI</div>
      <h1>Cluster EKS 5ASRCB</h1>
      <p class="subtitle">Projet Infrastructure Cloud — ESGI Master 5 · 2025-2026</p>

      <div class="grid">
        <div class="card">
          <div class="icon">☸️</div>
          <h3>Amazon EKS</h3>
          <p>Kubernetes 1.31<br>2 nœuds t3.micro</p>
        </div>
        <div class="card">
          <div class="icon">🏗️</div>
          <h3>Terraform IaC</h3>
          <p>38 ressources<br>Module core-compute</p>
        </div>
        <div class="card">
          <div class="icon">🌐</div>
          <h3>AWS ALB</h3>
          <p>Load Balancer<br>HTTP:80 public</p>
        </div>
        <div class="card">
          <div class="icon">🔒</div>
          <h3>VPC Sécurisé</h3>
          <p>6 subnets · 3 AZ<br>NAT Gateway</p>
        </div>
        <div class="card">
          <div class="icon">🪣</div>
          <h3>S3 Backend</h3>
          <p>tfstate versionné<br>accès sécurisé</p>
        </div>
        <div class="card">
          <div class="icon">👤</div>
          <h3>IAM Roles</h3>
          <p>Cluster + Nodes<br>least privilege</p>
        </div>
      </div>

      <div class="stack">
        <span class="tag blue">vpc-cni</span>
        <span class="tag blue">coredns</span>
        <span class="tag blue">kube-proxy</span>
        <span class="tag purple">Terraform 1.9</span>
        <span class="tag purple">AWS Provider 6.52</span>
        <span class="tag green">us-east-1</span>
        <span class="tag green">3 AZ</span>
      </div>

      <footer>
        Frédéric Junior EPESSE PRISO · <span>ESGI 5ASRCB</span> · Spécialisation Systèmes, Réseaux &amp; Cloud Computing
      </footer>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: nginx-html
